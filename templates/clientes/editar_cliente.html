{% extends 'base.html' %} {% block content %}

<h1>Editar Cliente</h1>

<form method="POST">
   {% csrf_token %}

   <div class="mb-3">
      <label>Nome:</label>

      <input
         type="text"
         name="nome"
         value="{{ cliente.nome }}"
         class="form-control"
      />
   </div>

   <div class="mb-3">
      <label>Email:</label>

      <input
         type="email"
         name="email"
         value="{{ cliente.email }}"
         class="form-control"
      />
   </div>

   <div class="mb-3">
      <label>Telefone:</label>

      <input
         type="text"
         name="telefone"
         value="{{ cliente.telefone }}"
         class="form-control"
      />
   </div>

   <div class="mb-3">
      <label>Endereço:</label>

      <input
         type="text"
         name="endereco"
         value="{{ cliente.endereco }}"
         class="form-control"
      />
   </div>

   <div class="mb-3">
      <label>Data Nascimento:</label>

      <input
         type="date"
         name="data_nascimento"
         value="{{ cliente.data_nascimento|date:'Y-m-d' }}"
         class="form-control"
      />
   </div>

   <div class="mb-3">
      <label>CPF:</label>

      <input
         type="text"
         name="cpf"
         value="{{ cliente.cpf }}"
         class="form-control"
      />
   </div>

   <button type="submit" class="btn btn-warning">Atualizar Cliente</button>
</form>

{% endblock %}
