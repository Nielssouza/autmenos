<!doctype html>
<html lang="pt-br">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>AUTMENOS - Login</title>
      <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23111'/%3E%3Cpath d='M32 12L48 52H40.8L37.6 43.4H26.4L23.2 52H16L32 12ZM35.2 36.8L32 27.8L28.8 36.8H35.2Z' fill='white'/%3E%3Ccircle cx='47' cy='17' r='5' fill='%23f59e0b'/%3E%3C/svg%3E" />
      <link rel="shortcut icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23111'/%3E%3Cpath d='M32 12L48 52H40.8L37.6 43.4H26.4L23.2 52H16L32 12ZM35.2 36.8L32 27.8L28.8 36.8H35.2Z' fill='white'/%3E%3Ccircle cx='47' cy='17' r='5' fill='%23f59e0b'/%3E%3C/svg%3E" />
      <style>
         * { margin: 0; padding: 0; box-sizing: border-box; }
         body { background: #ffffff; color: #000000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

         .nav-bar { padding: 2rem 4rem; border-bottom: 1px solid #e8e8e8; }
         .nav-brand { font-size: 1.5rem; font-weight: 800; text-decoration: none; color: #000000; letter-spacing: -0.02em; }

         .login-section { min-height: calc(100vh - 74px); display: flex; align-items: center; justify-content: center; padding: 2rem; }
         .login-card { width: 100%; max-width: 420px; border: 1px solid #000000; border-radius: 8px; padding: 2.5rem; }
         .login-card h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
         .login-card p { color: #666666; margin-bottom: 2rem; }

         .form-field { margin-bottom: 1.5rem; }
         .form-field label { display: block; font-weight: 600; margin-bottom: 0.4rem; font-size: 0.9rem; }
         .form-field input { width: 100%; padding: 0.75rem 1rem; border: 1px solid #d8d8d8; border-radius: 4px; font-size: 1rem; transition: border-color 0.3s; }
         .form-field input:focus { outline: none; border-color: #000000; }

         .btn-submit { width: 100%; padding: 1rem; background: #000000; color: #ffffff; border: 2px solid #000000; border-radius: 4px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
         .btn-submit:hover { background: #ffffff; color: #000000; }

         .alert-error { background: #fff0f0; border: 1px solid #d32f2f; color: #d32f2f; padding: 0.75rem; border-radius: 4px; margin-bottom: 1.5rem; }
         .back-link { display: inline-block; margin-top: 1.5rem; text-decoration: none; color: #666666; font-weight: 500; }
         .back-link:hover { color: #000000; }
      </style>
   </head>
   <body>
      <nav class="nav-bar">
         <a href="/" class="nav-brand">AUTMENOS</a>
      </nav>

      <section class="login-section">
         <div class="login-card">
            <h1>Entrar</h1>
            <p>Acesse com sua conta de administrador.</p>

            {% if erro %}
               <div class="alert-error">
                  {{ erro }}
               </div>
            {% endif %}

            <form method="post">
               {% csrf_token %}
               <div class="form-field">
                  <label for="username">Usuário</label>
                  <input type="text" name="username" id="username" required />
               </div>
               <div class="form-field">
                  <label for="password">Senha</label>
                  <input type="password" name="password" id="password" required />
               </div>
               <button type="submit" class="btn-submit">Entrar</button>
            </form>

            <a href="/" class="back-link">&larr; Voltar ao início</a>
         </div>
      </section>
   </body>
</html>
