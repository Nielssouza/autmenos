{% extends 'base.html' %} {% block content %}

<h1>Editar Cliente</h1>

<form method="POST">
   {% csrf_token %}

   <div class="mb-3">
      <label>Nome:</label>
      {{ form.nome }}
   </div>

   <div class="mb-3">
      <label>Email:</label>
      {{ form.email }}
   </div>

   <div class="mb-3">
      <label>Telefone:</label>
      {{ form.telefone }}
   </div>

   <div class="mb-3">
      <label>Endereço:</label>
      {{ form.endereco }}
   </div>

   <div class="mb-3">
      <label>Data Nascimento:</label>
      {{ form.data_nascimento }}
   </div>

   <div class="mb-3">
      <label>CPF:</label>
      {{ form.cpf }}
   </div>

   <button type="submit" class="btn btn-warning">Atualizar Cliente</button>
</form>

{% endblock %}
