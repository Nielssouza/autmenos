<!-- templates/base.html -->

<!doctype html>
<html lang="pt-br">
   <head>
      <meta charset="UTF-8" />
      <title>{% block title %}AUTMENOS{% endblock %}</title>

      <style>
         * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
         }

         body {
            margin: 0;
            background-color: #030303;
            color: #ffffff;
         }

         header {
            height: 70px;
            border-bottom: 1px solid #000000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
         }

         header h2 {
            margin: 0;
            font-size: 24px;
         }

         header a {
            text-decoration: none;
            color: #ffffff;
            font-size: 16px;
         }

         main {
            padding: 40px 60px;
         }

         .container {
            width: 95%;
            max-width: 1400px;
            margin: 0 auto;
            border: 1px solid #484747;
            border-radius: 8px;
            padding: 40px;
         }

         h1 {
            font-size: 32px;
            margin-bottom: 10px;
         }

         .descricao {
            margin-bottom: 25px;
            color: #858383;
         }

         form label {
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
         }

         form input,
         form select,
         form textarea {
            width: 100%;
            height: 38px;
            padding: 8px;
            border: 1px solid #faf8f8;
            border-radius: 4px;
            margin-bottom: 15px;
         }

         .linha {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
         }

         button,
         .btn {
            width: 100%;
            background: #f1efef;
            color: #060606;
            border: none;
            padding: 14px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            display: inline-block;
            margin-top: 10px;
         }

         .btn:hover {
            background: #4f4f4f;
            transform: translateY(-1px);
            transition: all 0.3s ease;
         }

         .voltar {
            display: inline-block;
            margin-top: 20px;
            color: #faf9f9;
            text-decoration: none;
         }

         table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
         }

         th {
            background: #fbfbfb;
            color: #0a0a0a;
            padding: 12px;
            text-align: left;
         }

         td {
            padding: 12px;
            border-bottom: 1px solid #303030;
         }

         .tabela-responsiva {
            width: 100%;
            overflow-x: auto;
         }

         .tabela-responsiva table {
            width: 100%;
            min-width: 720px;
         }

         .actions {
            white-space: nowrap;
         }

         .btn-edit,
         .btn-delete {
            display: inline-flex;
            align-items: center;
            gap: 6px;

            padding: 8px 14px;

            border-radius: 8px;

            text-decoration: none;

            font-size: 0.85rem;
            font-weight: 600;

            transition: all 0.25s ease;
         }

         .btn-edit {
            background: #060606;
            color: rgb(255, 255, 255);
         }

         .btn-edit:hover {
            background: #f4f4f5;
            color: black;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(4, 4, 4, 0.3);
         }

         .btn-delete {
            background: #ffffff;
            color: rgb(2, 2, 2);
            margin-left: 6px;
         }

         .btn-delete:hover {
            background: #020202;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(4, 4, 4, 0.3);
         }

         .products-page {
            max-width: 100%;
            margin: 0 auto;
         }

         .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
         }

         .section-label {
            color: #666;
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.08em;
         }

         .page-header h1 {
            font-size: 2.6rem;
            margin: 0.4rem 0;
         }

         .page-header p {
            color: #666;
         }

         .btn-new {
            background: #f9f8f8;
            color: #111111;
            padding: 0.9rem 1.4rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            white-space: nowrap;
         }

         .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
         }

         .summary-card {
            background: #363636;
            border: 1px solid #030303;
            border-radius: 14px;
            padding: 1.4rem;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.04);
         }

         .summary-card span {
            color: #fdfdfd;
            font-size: 0.9rem;
            font-weight: 600;
         }

         .summary-card strong {
            display: block;
            margin-top: 0.5rem;
            font-size: 2rem;
         }

         .table-card {
            background: #1f1f1f;
            border: 1px solid #ffffff;
            border-radius: 14px;
            padding: 1.5rem;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.04);
            overflow-x: auto;
         }

         .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            gap: 1rem;
         }

         .search-input {
            padding: 0.8rem 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            min-width: 260px;
         }

         .products-table {
            width: 100%;
            min-width: 1100px;
            border-collapse: collapse;
         }

         .products-table th {
            text-align: left;
            padding: 1rem;
            background: #fffefe;
            color: #020202;
            font-size: 0.85rem;
         }

         .products-table td {
            padding: 1rem;
            border-bottom: 1px solid #eee;
         }

         .products-table tr:hover {
            background: #2b2b2b;
         }

         .stock-badge {
            background: #eef2ff;
            color: #888889;
            padding: 0.35rem 0.7rem;
            border-radius: 999px;
            font-weight: 700;
         }

         .btn-edit,
         .btn-delete {
            padding: 0.5rem 0.8rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
         }

         .btn-edit {
            background: #383838;
            color: #fff;
         }

         .btn-delete {
            background: #fbfafa;
            color: #080808;
            margin-left: 0.4rem;
         }

         .empty-row {
            text-align: center;
            color: #555454;
            padding: 2rem;
         }

         @media (max-width: 768px) {
            .page-header,
            .table-header {
               flex-direction: column;
               align-items: flex-start;
            }

            .btn-new,
            .search-input {
               width: 100%;
            }
         }

         .badge-success {
            background: #dcfce7;
            color: #3c3c3c;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;

            white-space: nowrap;
         }

         .badge-warning {
            background: #fef3c7;
            color: #252220;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;

            white-space: nowrap;
         }

         .badge-danger {
            background: #fee2e2;
            color: #0f0f0f;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;

            white-space: nowrap;
         }

         .price-cell {
            white-space: nowrap;
            text-align: right;
            font-weight: 600;
         }

         .history-card {
            margin-top: 2rem;
         }

         .btn-move {
            background: #fff;
            color: #000;
            border: 1px solid #000;
            padding: 0.5rem 0.8rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            margin-left: 0.4rem;
         }

         .btn-move:hover {
            background: #000;
            color: #fff;
         }

         .filters {
            display: flex;
            gap: 12px;
            align-items: center;
         }

         .filters .search-input {
            min-width: 220px;
         }

         @media (max-width: 768px) {
            .filters {
               width: 100%;
               flex-direction: column;
            }

            .filters .search-input {
               width: 100%;
            }
         }

         .badge-dark {
            background: #000;
            color: #fff;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;

            white-space: nowrap;
         }
      </style>
   </head>

   <body>
      <header>
         <h2>AUTMENOS</h2>
         <a href="/">Início</a>
      </header>

      <main>
         <div class="container">{% block content %} {% endblock %}</div>
      </main>
   </body>
</html>
